services:
  evaluation:
    build:
      context: .
      dockerfile: Dockerfile.eval
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    env_file: .env
    profiles: ["evaluation"]
    volumes:
      - ./data:/data:ro
      - ./knowledge_base/approved_documents:/knowledge:ro
      - ./evaluation_outputs:/outputs
      - ./evaluation:/app/evaluation:ro
      - ./scripts:/app/scripts:ro
      - ./tests:/app/tests:ro
      - eval_model_cache:/root/.cache
    environment:
      IU_XRAY_DATASET_PATH: /data/iu-xray
      KNOWLEDGE_DOCUMENT_PATH: /knowledge
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-60}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  eval_model_cache:
